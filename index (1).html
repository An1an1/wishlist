<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MY Wishlist ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a84c;
  --gold-light: #e8d5a3;
  --gold-dark: #8a6a1f;
  --bg: #0a0a0f;
  --bg2: #11111a;
  --card-bg: #16161f;
  --text: #f0ead8;
  --text-muted: #7a7060;
  --rose: #c47a6a;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Montserrat', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    radial-gradient(1px 1px at 10% 15%, rgba(201,168,76,.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 30% 40%, rgba(255,255,255,.4) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 50% 10%, rgba(201,168,76,.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 85% 25%, rgba(201,168,76,.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 20% 75%, rgba(255,255,255,.3) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 60% 80%, rgba(201,168,76,.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 90%, rgba(255,255,255,.2) 0%, transparent 100%),
    radial-gradient(1px 1px at 45% 50%, rgba(255,255,255,.25) 0%, transparent 100%),
    radial-gradient(1px 1px at 75% 35%, rgba(201,168,76,.3) 0%, transparent 100%);
  pointer-events: none; z-index: 0;
  animation: twinkle 8s ease-in-out infinite alternate;
}
@keyframes twinkle { 0%{opacity:.6} 100%{opacity:1} }

/* Header */
header {
  position: sticky; top: 0; z-index: 100;
  background: linear-gradient(180deg, rgba(10,10,15,.98) 0%, rgba(10,10,15,.88) 100%);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(201,168,76,.15);
  padding: 0 2.5rem;
  display: flex; align-items: center; justify-content: space-between;
  height: 78px;
}
.logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.9rem; font-weight: 300; font-style: italic; letter-spacing: .08em;
  background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.logo b { font-style: normal; font-weight: 600; }
.sub { font-size: .65rem; letter-spacing: .25em; text-transform: uppercase; color: var(--text-muted); margin-top: 2px; }
.cart-btn {
  position: relative; background: none;
  border: 1px solid rgba(201,168,76,.3); color: var(--gold);
  width: 46px; height: 46px; border-radius: 50%; cursor: pointer;
  font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
  transition: all .3s;
}
.cart-btn:hover { background: rgba(201,168,76,.1); border-color: var(--gold); transform: scale(1.05); }
.cart-badge {
  position: absolute; top: -4px; right: -4px;
  background: var(--rose); color: #fff; font-size: .6rem; font-weight: 500;
  width: 18px; height: 18px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transform: scale(0);
  transition: all .3s cubic-bezier(.34,1.56,.64,1);
}
.cart-badge.show { opacity: 1; transform: scale(1); }

/* Hero */
.hero { position: relative; z-index: 1; text-align: center; padding: 4rem 2rem 3rem; }
.eyebrow { font-size: .62rem; letter-spacing: .4em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; opacity: 0; animation: fadeUp .8s .2s forwards; }
.hero h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.8rem,7vw,5.5rem); font-weight: 300; line-height: 1.05; opacity: 0; animation: fadeUp .8s .4s forwards; }
.hero h1 em { font-style: italic; background: linear-gradient(135deg, var(--gold-light), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.divider { width: 60px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 1.8rem auto; opacity: 0; animation: fadeIn .8s .7s forwards; }

@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }
@keyframes fadeIn  { from{opacity:0} to{opacity:1} }

/* Categories */
.cats {
  position: relative; z-index: 1;
  display: flex; flex-wrap: wrap; gap: .6rem; justify-content: center;
  padding: 0 2rem 2.5rem; max-width: 1200px; margin: 0 auto;
}
.cat-btn {
  background: transparent;
  border: 1px solid rgba(201,168,76,.18);
  color: var(--text-muted);
  font-family: 'Montserrat', sans-serif;
  font-size: .62rem; letter-spacing: .18em; text-transform: uppercase;
  padding: .45rem 1.1rem; border-radius: 20px; cursor: pointer;
  transition: all .25s;
}
.cat-btn:hover { border-color: rgba(201,168,76,.5); color: var(--gold); }
.cat-btn.active { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #0a0a0f; border-color: var(--gold); font-weight: 500; }

/* Grid */
.grid {
  position: relative; z-index: 1;
  display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 1.3rem; max-width: 1280px; margin: 0 auto; padding: 0 2rem 5rem;
}
.card {
  background: var(--card-bg);
  border: 1px solid rgba(201,168,76,.09);
  border-radius: 2px; overflow: hidden;
  display: flex; flex-direction: column;
  transition: transform .4s cubic-bezier(.25,.46,.45,.94), box-shadow .4s, border-color .4s;
  opacity: 0; animation: fadeUp .7s forwards;
}
.card:hover { transform: translateY(-6px); border-color: rgba(201,168,76,.32); box-shadow: 0 20px 50px rgba(0,0,0,.5), 0 0 28px rgba(201,168,76,.06); }
.card-img { position: relative; width: 100%; padding-top: 100%; overflow: hidden; background: #0e0e16; }
.card-img img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transition: transform .7s cubic-bezier(.25,.46,.45,.94); }
.card:hover .card-img img { transform: scale(1.06); }
.card-img::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg,transparent 55%,rgba(10,10,15,.65) 100%); pointer-events: none; }

.card-body { padding: 1.2rem 1.3rem 1.4rem; display: flex; flex-direction: column; gap: .4rem; flex: 1; }
.card-brand { font-size: .58rem; letter-spacing: .3em; text-transform: uppercase; color: var(--gold); }
.card-name { font-family: 'Cormorant Garamond', serif; font-size: 1.25rem; font-weight: 400; }
.card-footer {
  display: flex; align-items: center; justify-content: space-between;
  gap: .8rem; margin-top: .7rem; flex-wrap: nowrap;
}
.card-price { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 300; color: var(--gold-light); white-space: nowrap; flex-shrink: 0; }
.gift-btn {
  flex-shrink: 0;
  background: transparent; border: 1px solid rgba(201,168,76,.38); color: var(--gold);
  font-family: 'Montserrat', sans-serif; font-size: .6rem; font-weight: 500;
  letter-spacing: .18em; text-transform: uppercase;
  padding: .5rem .9rem; border-radius: 1px; cursor: pointer;
  transition: all .3s; white-space: nowrap; position: relative; overflow: hidden;
}
.gift-btn::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg,var(--gold),var(--gold-dark)); opacity: 0; transition: opacity .3s; }
.gift-btn span { position: relative; z-index: 1; }
.gift-btn:hover::before { opacity: 1; }
.gift-btn:hover { color: #0a0a0f; border-color: var(--gold); box-shadow: 0 4px 18px rgba(201,168,76,.28); }
.gift-btn.added { background: linear-gradient(135deg,var(--gold),var(--gold-dark)); color: #0a0a0f; border-color: var(--gold); }
.gift-btn.added::before { opacity: 0; }

/* Sparkles */
.sparkle { position: fixed; pointer-events: none; z-index: 9999; font-size: 1.2rem; animation: floatUp 1.2s ease-out forwards; }
@keyframes floatUp { 0%{opacity:1;transform:translateY(0) scale(1) rotate(0)} 100%{opacity:0;transform:translateY(-80px) scale(.3) rotate(180deg)} }

/* Cart overlay + drawer */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.72); z-index: 200; opacity: 0; pointer-events: none; transition: opacity .4s; backdrop-filter: blur(4px); }
.overlay.open { opacity: 1; pointer-events: all; }
.drawer {
  position: fixed; top: 0; right: -500px; width: min(480px,100vw); height: 100vh;
  background: var(--bg2); border-left: 1px solid rgba(201,168,76,.14); z-index: 201;
  display: flex; flex-direction: column;
  transition: right .4s cubic-bezier(.25,.46,.45,.94); overflow: hidden;
}
.drawer.open { right: 0; }
.drawer-head { padding: 1.6rem 2rem; border-bottom: 1px solid rgba(201,168,76,.12); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.drawer-title { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 300; font-style: italic; color: var(--gold-light); }
.x-btn { background: none; border: none; color: var(--text-muted); font-size: 1.3rem; cursor: pointer; padding: .3rem; line-height: 1; transition: color .2s; }
.x-btn:hover { color: var(--text); }
.drawer-items { flex: 1; overflow-y: auto; padding: 1.4rem 2rem; display: flex; flex-direction: column; gap: .9rem; }
.drawer-items::-webkit-scrollbar { width: 3px; }
.drawer-items::-webkit-scrollbar-thumb { background: rgba(201,168,76,.3); border-radius: 2px; }
.empty-msg { text-align: center; padding: 4rem 1rem; color: var(--text-muted); }
.empty-msg .ei { font-size: 2.5rem; display: block; margin-bottom: 1rem; opacity: .5; }
.empty-msg p { font-size: .75rem; letter-spacing: .08em; }
.cart-item { display: flex; gap: .9rem; align-items: center; padding: .9rem; background: rgba(201,168,76,.04); border: 1px solid rgba(201,168,76,.08); border-radius: 2px; animation: fadeUp .3s forwards; }
.ci-img { width: 58px; height: 58px; object-fit: cover; border-radius: 1px; flex-shrink: 0; background: #0e0e16; }
.ci-info { flex: 1; min-width: 0; }
.ci-brand { font-size: .52rem; letter-spacing: .25em; text-transform: uppercase; color: var(--gold); }
.ci-name { font-family: 'Cormorant Garamond', serif; font-size: .95rem; }
.ci-price { font-size: .7rem; color: var(--text-muted); margin-top: .15rem; }
.ci-qty { display: flex; align-items: center; gap: .5rem; margin-top: .4rem; }
.qty-btn { background: none; border: 1px solid rgba(201,168,76,.25); color: var(--gold); width: 22px; height: 22px; border-radius: 2px; cursor: pointer; font-size: .8rem; display: flex; align-items: center; justify-content: center; transition: all .2s; }
.qty-btn:hover { background: rgba(201,168,76,.1); }
.qty-val { font-size: .75rem; min-width: 18px; text-align: center; }
.ci-rm { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: .95rem; padding: .3rem; transition: color .2s; flex-shrink: 0; }
.ci-rm:hover { color: var(--rose); }
.drawer-foot { padding: 1.3rem 2rem 1.8rem; border-top: 1px solid rgba(201,168,76,.12); flex-shrink: 0; }
.total-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 1.1rem; }
.total-lbl { font-size: .62rem; letter-spacing: .25em; text-transform: uppercase; color: var(--text-muted); }
.total-amt { font-family: 'Cormorant Garamond', serif; font-size: 1.55rem; color: var(--gold-light); }
.co-btn { width: 100%; background: linear-gradient(135deg,var(--gold),var(--gold-dark)); border: none; color: #0a0a0f; font-family: 'Montserrat', sans-serif; font-size: .68rem; font-weight: 500; letter-spacing: .22em; text-transform: uppercase; padding: 1rem; border-radius: 1px; cursor: pointer; transition: all .3s; }
.co-btn:hover { box-shadow: 0 6px 25px rgba(201,168,76,.4); transform: translateY(-1px); }

/* Modal */
.modal-ov { position: fixed; inset: 0; background: rgba(0,0,0,.87); z-index: 300; opacity: 0; pointer-events: none; transition: opacity .4s; backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
.modal-ov.open { opacity: 1; pointer-events: all; }
.modal { background: var(--bg2); border: 1px solid rgba(201,168,76,.2); border-radius: 2px; width: 100%; max-width: 500px; transform: translateY(20px) scale(.97); transition: transform .4s cubic-bezier(.25,.46,.45,.94); overflow: hidden; }
.modal-ov.open .modal { transform: none; }
.modal-head { padding: 1.8rem 2rem 1.4rem; border-bottom: 1px solid rgba(201,168,76,.1); text-align: center; }
.modal-ttl { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 300; font-style: italic; color: var(--gold-light); }
.modal-sub { font-size: .62rem; letter-spacing: .2em; text-transform: uppercase; color: var(--text-muted); margin-top: .3rem; }
.modal-body { padding: 1.6rem 2rem; }
.field { margin-bottom: 1.1rem; }
.field label { display: block; font-size: .58rem; letter-spacing: .25em; text-transform: uppercase; color: var(--gold); margin-bottom: .45rem; }
.field input, .field textarea, .field select {
  width: 100%; background: rgba(201,168,76,.04); border: 1px solid rgba(201,168,76,.15); border-radius: 1px;
  color: var(--text); font-family: 'Montserrat', sans-serif; font-size: .82rem; font-weight: 300;
  padding: .7rem .85rem; transition: border-color .2s; outline: none;
}
.field input:focus, .field textarea:focus { border-color: rgba(201,168,76,.5); background: rgba(201,168,76,.07); }
.field textarea { resize: none; height: 76px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.order-summary { background: rgba(201,168,76,.04); border: 1px solid rgba(201,168,76,.1); border-radius: 1px; padding: .9rem; margin-bottom: 1.1rem; font-size: .72rem; color: var(--text-muted); line-height: 1.7; }
.order-summary strong { color: var(--gold-light); font-weight: 400; }
.modal-actions { display: flex; gap: .8rem; padding: 0 2rem 1.8rem; }
.btn-sec { flex: 1; background: none; border: 1px solid rgba(201,168,76,.2); color: var(--text-muted); font-family: 'Montserrat', sans-serif; font-size: .62rem; letter-spacing: .2em; text-transform: uppercase; padding: .85rem; border-radius: 1px; cursor: pointer; transition: all .2s; }
.btn-sec:hover { border-color: var(--gold); color: var(--text); }
.btn-pri { flex: 2; background: linear-gradient(135deg,var(--gold),var(--gold-dark)); border: none; color: #0a0a0f; font-family: 'Montserrat', sans-serif; font-size: .62rem; font-weight: 500; letter-spacing: .2em; text-transform: uppercase; padding: .85rem; border-radius: 1px; cursor: pointer; transition: all .3s; }
.btn-pri:hover { box-shadow: 0 4px 20px rgba(201,168,76,.35); transform: translateY(-1px); }

/* Success */
.success { display: none; text-align: center; padding: 2.8rem 2rem; }
.success.show { display: block; }
.s-icon { font-size: 2.8rem; margin-bottom: .9rem; animation: pulse 2s infinite; display: block; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
.s-ttl { font-family: 'Cormorant Garamond', serif; font-size: 1.7rem; font-style: italic; color: var(--gold-light); margin-bottom: .5rem; }
.s-txt { font-size: .73rem; color: var(--text-muted); line-height: 1.8; }

@media(max-width:600px){
  header{padding:0 1.2rem;}
  .grid{padding:0 1rem 4rem;gap:1rem;}
  .hero{padding:2.5rem 1rem 2rem;}
  .cats{padding:0 1rem 2rem;}
  .field-row{grid-template-columns:1fr;}
  .modal-actions{flex-direction:column;}
}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo"><b>MY</b> Wishlist</div>
    <div class="sub">what I dream of ✦</div>
  </div>
  <button class="cart-btn" id="cartBtn">
    🛍
    <span class="cart-badge" id="cartBadge">0</span>
  </button>
</header>

<div class="hero">
  <p class="eyebrow">✦ Curated with love ✦</p>
  <h1>Dreams &amp; <em>Desires</em></h1>
  <div class="divider"></div>
</div>

<div class="cats" id="cats">
  <button class="cat-btn active" data-cat="all">✦ Все</button>
  <button class="cat-btn" data-cat="flowers">🌸 Flowers</button>
  <button class="cat-btn" data-cat="jewelry">💎 Jewelry</button>
  <button class="cat-btn" data-cat="realestate">🏠 Realestate</button>
  <button class="cat-btn" data-cat="cars">🚗 Cars</button>
  <button class="cat-btn" data-cat="tech">📱 Tech</button>
  <button class="cat-btn" data-cat="shoes">👠 Shoes</button>
  <button class="cat-btn" data-cat="lingerie">🩷 Lingerie</button>
  <button class="cat-btn" data-cat="travel">✈️ Travel</button>
  <button class="cat-btn" data-cat="bags">👜 Bags</button>
  <button class="cat-btn" data-cat="money">💰 Money</button>
</div>

<div class="grid" id="grid"></div>

<!-- Cart -->
<div class="overlay" id="ov"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <div class="drawer-title">Мои желания</div>
    <button class="x-btn" id="closeDrawer">✕</button>
  </div>
  <div class="drawer-items" id="drawerItems"></div>
  <div class="drawer-foot" id="drawerFoot" style="display:none">
    <div class="total-row">
      <span class="total-lbl">Итого</span>
      <span class="total-amt" id="totalAmt">$0</span>
    </div>
    <button class="co-btn" id="coBtn">✦ Оформить подарок ✦</button>
  </div>
</div>

<!-- Checkout modal -->
<div class="modal-ov" id="modalOv">
  <div class="modal">
    <div id="formView">
      <div class="modal-head">
        <div class="modal-ttl">Оформление подарка</div>
        <div class="modal-sub">заполните детали ниже</div>
      </div>
      <div class="modal-body">
        <div class="order-summary" id="orderSummary"></div>
        <div class="field"><label>Ваше имя</label><input id="f_name" type="text" placeholder="Имя отправителя"></div>
        <div class="field"><label>Email</label><input id="f_email" type="email" placeholder="your@email.com"></div>
        <div class="field-row">
          <div class="field"><label>Телефон</label><input id="f_phone" type="tel" placeholder="+7 (___) ___-__-__"></div>
          <div class="field"><label>Доставка</label>
            <select id="f_del" style="height:42px"><option>Самовывоз</option><option>Курьер</option><option>Сюрприз 🎁</option></select>
          </div>
        </div>
        <div class="field"><label>Послание (необязательно)</label><textarea id="f_msg" placeholder="Напишите тёплые слова..."></textarea></div>
      </div>
      <div class="modal-actions">
        <button class="btn-sec" id="cancelModal">Назад</button>
        <button class="btn-pri" id="submitBtn">Подарить ✦</button>
      </div>
    </div>
    <div class="success" id="successView">
      <span class="s-icon">✨</span>
      <div class="s-ttl">Желание отправлено!</div>
      <p class="s-txt">Спасибо за волшебство.<br>Мы свяжемся с вами для подтверждения подарка.</p>
      <div style="height:1.8rem"></div>
      <button class="btn-pri" id="closeSuccess" style="max-width:200px;margin:0 auto;display:block">Закрыть</button>
    </div>
  </div>
</div>

<script>
const ITEMS = [
  { id:1, cat:"flowers", img:"https://images.unsplash.com/photo-1487530811015-780a01e27b35?w=600&q=80", name:"Большой букет пионов", brand:"Flowers", price:150, priceText:"$150" },
  { id:2, cat:"jewelry", img:"https://raw.githubusercontent.com/An1an1/wishlist/696c8c4e66ba14ca56c282ce46ac46e615a0fc54/images/10625749120071999.jpg", name:"Watch", brand:"Cartier", price:17800, priceText:"$17,800" },
  { id:3, cat:"jewelry", img:"https://raw.githubusercontent.com/An1an1/wishlist/696c8c4e66ba14ca56c282ce46ac46e615a0fc54/images/10907224092417006.jpg", name:"Watch", brand:"Rolex", price:51900, priceText:"$51,900" },
  { id:4, cat:"jewelry", img:"https://raw.githubusercontent.com/An1an1/wishlist/696c8c4e66ba14ca56c282ce46ac46e615a0fc54/images/15551561209295402.jpg", name:"Watch", brand:"Rolex", price:15400, priceText:"$15,400" },
  { id:5, cat:"jewelry", img:"https://raw.githubusercontent.com/An1an1/wishlist/696c8c4e66ba14ca56c282ce46ac46e615a0fc54/images/2533343538101877.jpg", name:"Watch", brand:"Bvlgari", price:30000, priceText:"$30,000" },
  { id:6, cat:"jewelry", img:"https://raw.githubusercontent.com/An1an1/wishlist/696c8c4e66ba14ca56c282ce46ac46e615a0fc54/images/Без%20названия%20(4).jpg", name:"Watch", brand:"Rolex", price:120000, priceText:"$120,000" },
];

const KEY = 'wl_cart_v3';
let cart = [];

function loadCart() {
  try { cart = JSON.parse(localStorage.getItem(KEY)) || []; } catch { cart = []; }
}
function saveCart() {
  try { localStorage.setItem(KEY, JSON.stringify(cart)); } catch {}
}

// ── Render grid ──
let currentCat = 'all';
function renderGrid() {
  const g = document.getElementById('grid');
  g.innerHTML = '';
  const list = currentCat === 'all' ? ITEMS : ITEMS.filter(i => i.cat === currentCat);
  list.forEach((item, idx) => {
    const inCart = cart.some(c => c.id === item.id);
    const d = document.createElement('div');
    d.className = 'card';
    d.style.animationDelay = (idx * 0.07) + 's';
    d.innerHTML = `
      <div class="card-img">
        <img src="${item.img}" alt="${item.name}" loading="lazy"
             onerror="this.src='https://images.unsplash.com/photo-1523170335258-f5ed11844a49?w=600&q=80'">
      </div>
      <div class="card-body">
        <div class="card-brand">${item.brand}</div>
        <div class="card-name">${item.name}</div>
        <div class="card-footer">
          <div class="card-price">${item.priceText}</div>
          <button class="gift-btn ${inCart?'added':''}" data-id="${item.id}">
            <span>${inCart ? '✓ Добавлено' : '🎁 Подарить'}</span>
          </button>
        </div>
      </div>`;
    g.appendChild(d);
  });
}

// ── Sparkles ──
function sparkles(x, y) {
  ['✨','⭐','💫','🌟','✦'].forEach((e, i) => {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'sparkle'; el.textContent = e;
      el.style.left = (x + (Math.random()-.5)*60) + 'px';
      el.style.top  = (y + (Math.random()-.5)*40) + 'px';
      el.style.animationDuration = (.8 + Math.random()*.6) + 's';
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }, i * 65);
  });
}

// ── Cart badge ──
function updateBadge() {
  const n = cart.reduce((s,i) => s + (i.qty||1), 0);
  const b = document.getElementById('cartBadge');
  b.textContent = n;
  b.classList.toggle('show', n > 0);
}

// ── Drawer ──
function renderDrawer() {
  const el = document.getElementById('drawerItems');
  const foot = document.getElementById('drawerFoot');
  if (!cart.length) {
    el.innerHTML = `<div class="empty-msg"><span class="ei">🌙</span><p>Список желаний пуст.<br>Добавьте что-нибудь волшебное.</p></div>`;
    foot.style.display = 'none'; return;
  }
  el.innerHTML = '';
  let total = 0;
  cart.forEach(item => {
    total += item.price * (item.qty||1);
    const d = document.createElement('div'); d.className = 'cart-item';
    d.innerHTML = `
      <img class="ci-img" src="${item.img}" alt="${item.name}"
           onerror="this.src='https://images.unsplash.com/photo-1523170335258-f5ed11844a49?w=600&q=80'">
      <div class="ci-info">
        <div class="ci-brand">${item.brand}</div>
        <div class="ci-name">${item.name}</div>
        <div class="ci-price">${item.priceText}</div>
        <div class="ci-qty">
          <button class="qty-btn" data-action="dec" data-id="${item.id}">−</button>
          <span class="qty-val">${item.qty||1}</span>
          <button class="qty-btn" data-action="inc" data-id="${item.id}">+</button>
        </div>
      </div>
      <button class="ci-rm" data-action="rm" data-id="${item.id}">✕</button>`;
    el.appendChild(d);
  });
  document.getElementById('totalAmt').textContent = '$' + total.toLocaleString('en-US');
  foot.style.display = 'block';
}

function openDrawer() { renderDrawer(); document.getElementById('drawer').classList.add('open'); document.getElementById('ov').classList.add('open'); }
function closeDrawer() { document.getElementById('drawer').classList.remove('open'); document.getElementById('ov').classList.remove('open'); }

// ── Events ──
document.getElementById('grid').addEventListener('click', e => {
  const btn = e.target.closest('.gift-btn'); if (!btn) return;
  const id = +btn.dataset.id;
  const item = ITEMS.find(i => i.id === id); if (!item) return;
  const idx = cart.findIndex(c => c.id === id);
  if (idx >= 0) {
    cart.splice(idx, 1);
    btn.classList.remove('added');
    btn.querySelector('span').textContent = '🎁 Подарить';
  } else {
    cart.push({...item, qty:1});
    btn.classList.add('added');
    btn.querySelector('span').textContent = '✓ Добавлено';
    const r = btn.getBoundingClientRect();
    sparkles(r.left + r.width/2, r.top);
  }
  saveCart(); updateBadge();
});

document.getElementById('drawerItems').addEventListener('click', e => {
  const btn = e.target.closest('[data-action]'); if (!btn) return;
  const id = +btn.dataset.id;
  const idx = cart.findIndex(c => c.id === id); if (idx < 0) return;
  if (btn.dataset.action === 'rm') cart.splice(idx,1);
  else if (btn.dataset.action === 'inc') cart[idx].qty = (cart[idx].qty||1) + 1;
  else if (btn.dataset.action === 'dec') { cart[idx].qty = Math.max(1,(cart[idx].qty||1)-1); }
  saveCart(); updateBadge(); renderDrawer(); renderGrid();
});

document.getElementById('cartBtn').addEventListener('click', openDrawer);
document.getElementById('closeDrawer').addEventListener('click', closeDrawer);
document.getElementById('ov').addEventListener('click', closeDrawer);

document.getElementById('coBtn').addEventListener('click', () => {
  closeDrawer();
  const total = cart.reduce((s,i) => s + i.price*(i.qty||1), 0);
  const names = cart.map(i => `${i.brand} ${i.name}${i.qty>1?' x'+i.qty:''}`).join(', ');
  document.getElementById('orderSummary').innerHTML = `Вы выбрали: <strong>${names}</strong><br>Сумма: <strong>$${total.toLocaleString('en-US')}</strong>`;
  document.getElementById('modalOv').classList.add('open');
});

document.getElementById('cancelModal').addEventListener('click', () => document.getElementById('modalOv').classList.remove('open'));

document.getElementById('submitBtn').addEventListener('click', () => {
  const name = document.getElementById('f_name').value.trim();
  const email = document.getElementById('f_email').value.trim();
  if (!name || !email) { alert('Пожалуйста, укажите имя и email'); return; }
  document.getElementById('formView').style.display = 'none';
  document.getElementById('successView').classList.add('show');
  cart = []; saveCart(); updateBadge(); renderGrid();
  for (let i = 0; i < 18; i++) setTimeout(() => sparkles(Math.random()*window.innerWidth, Math.random()*window.innerHeight*.6), i*90);
});

document.getElementById('closeSuccess').addEventListener('click', () => {
  document.getElementById('modalOv').classList.remove('open');
  document.getElementById('formView').style.display = 'block';
  document.getElementById('successView').classList.remove('show');
  ['f_name','f_email','f_phone','f_msg'].forEach(id => document.getElementById(id).value = '');
});

// Categories
document.getElementById('cats').addEventListener('click', e => {
  const btn = e.target.closest('.cat-btn'); if (!btn) return;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCat = btn.dataset.cat;
  renderGrid();
});

// Init
loadCart(); renderGrid(); updateBadge();
</script>
</body>
</html>
