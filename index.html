<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MY Wishlist ✨</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .wish-card {
      transition: all 0.4s ease;
    }
    .wish-card:hover {
      transform: translateY(-12px);
      box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15);
    }
    .btn-dar {
      transition: all 0.3s ease;
    }
    .btn-dar:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body class="bg-zinc-50 min-h-screen">

  <!-- Header -->
  <header class="bg-white border-b border-gray-100 py-6">
    <div class="max-w-5xl mx-auto px-6 text-center">
      <h1 class="text-4xl font-light tracking-tight text-gray-900">MY Wishlist ✨</h1>
      <p class="text-gray-500 mt-2">what I dream of</p>
    </div>
  </header>

  <div class="max-w-5xl mx-auto px-6 py-12">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">

      <!-- Карточка (копируй этот блок для новых желаний) -->
      <div class="wish-card bg-white rounded-3xl overflow-hidden shadow-sm border border-gray-100">
        <img src="https://via.placeholder.com/600x600/eee/ddd?text=Фото_1" 
             class="w-full h-80 object-cover" alt="Желание">
        <div class="p-6">
          <h3 class="font-medium text-xl mb-1">Название вещи</h3>
          <p class="text-gray-500 text-sm mb-4">Короткое описание или бренд</p>
          
          <div class="flex justify-between items-center">
            <span class="text-2xl font-semibold text-gray-900">00 000 ₽</span>
            
            <a href="#" target="_blank" 
               class="btn-dar bg-purple-600 hover:bg-purple-700 text-white px-6 py-2.5 rounded-full text-sm font-medium flex items-center gap-2">
              Подарить 
              <i class="fa-solid fa-arrow-up-right-from-square"></i>
            </a>
          </div>
        </div>
      </div>

      <!-- Добавляй сюда новые карточки, копируя блок выше -->

    </div>
  </div>

  <footer class="text-center py-8 text-gray-400 text-sm">
    Сделано с ❤️ • GitHub Pages
  </footer>

</body>
</html>
