<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MY Wishlist</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
body { 
      font-family: 'Segoe UI', system-ui, sans-serif; 
    }

    .wish-card {
      background: white;
      border-radius: 24px;
      overflow: hidden;
      position: relative;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1;
    }

    /* Нежное розовое свечение СЗАДИ */
    .wish-card::before {
      content: '';
      position: absolute;
      inset: -18px;
      background: linear-gradient(135deg, #fce7f3, #f9a8d4, #f472b6);
      opacity: 0;
      border-radius: 36px;
      z-index: -1;
      filter: blur(20px);
      transition: all 0.5s ease;
      pointer-events: none;
    }

    .wish-card:hover::before {
      opacity: 0.75;
    }

    .wish-card:hover {
      transform: translateY(-10px);
    }

    /* Цена как на luxylist */
    .price {
      font-size: 1.85rem;
      font-weight: 300;
      letter-spacing: -0.04em;
      color: #1f2937;
    }

    /* Кнопка Подарить — нежно-розовый градиент */
    .btn-gift {
      background: linear-gradient(90deg, #f9a8d4, #f472b6, #db2777);
      box-shadow: 0 4px 20px -4px rgb(236 72 153 / 0.4);
      transition: all 0.3s ease;
    }

    .btn-gift:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px -6px rgb(236 72 153 / 0.5);
      background: linear-gradient(90deg, #f472b6, #db2777, #be185d);
    }

    .category-tab {
      transition: all 0.3s ease;
    }
    .category-tab.active {
      background-color: #6b21a8;
      color: white;
      border-color: #6b21a8;
    }
</style>
</head>
<body class="bg-zinc-50 min-h-screen">

  <header class="bg-white border-b border-gray-100 py-6">
    <div class="max-w-6xl mx-auto px-6 text-center">
      <h1 class="text-4xl font-light tracking-tight text-gray-900">MY Wishlist</h1>
      <p class="text-gray-500 mt-2">what I dream of ❤️</p>
    </div>
  </header>

  <div class="max-w-6xl mx-auto px-6 py-8">
    <!-- Категории -->
    <div class="flex flex-wrap gap-3 justify-center mb-10" id="categories">
      <button onclick="filterCategory('all')" class="category-tab active px-6 py-3 rounded-full border text-sm font-medium">All</button>
      <button onclick="filterCategory('flowers')" class="category-tab px-6 py-3 rounded-full border text-sm font-medium">🌸 Flowers</button>
      <button onclick="filterCategory('jewelry')" class="category-tab px-6 py-3 rounded-full border text-sm font-medium">💎 Jewelry</button>
      <button onclick="filterCategory('realestate')" class="category-tab px-6 py-3 rounded-full border text-sm font-medium">🏠 Realestate</button>
      <button onclick="filterCategory('cars')" class="category-tab px-6 py-3 rounded-full border text-sm font-medium">🚗 Cars</button>
      <button onclick="filterCategory('tech')" class="category-tab px-6 py-3 rounded-full border text-sm font-medium">📱 Tech & Gadgets</button>
      <button onclick="filterCategory('shoes')" class="category-tab px-6 py-3 rounded-full border text-sm font-medium">👠 Shoes</button>
      <button onclick="filterCategory('lingerie')" class="category-tab px-6 py-3 rounded-full border text-sm font-medium">🩷 Lingerie</button>
      <button onclick="filterCategory('travel')" class="category-tab px-6 py-3 rounded-full border text-sm font-medium">✈️ Travel</button>
      <button onclick="filterCategory('bags')" class="category-tab px-6 py-3 rounded-full border text-sm font-medium">👜 Bags</button>
      <button onclick="filterCategory('money')" class="category-tab px-6 py-3 rounded-full border text-sm font-medium">💰 Money & Crypto</button>
    </div>

    <!-- Сетка желаний -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="wishlist-grid">
      <!-- Сюда будут добавляться карточки через JS -->
    </div>
  </div>

  <script>
    const items = [
      {
        category: "flowers",
        img: "https://via.placeholder.com/600x600/eee/ddd?text=Букет_роз",
        name: "Большой букет пионов",
        desc: "Нежно-розовые",
        price: "15 000 ₽",
        link: "#"
      },
      {
        category: "jewelry",
        img: "https://raw.githubusercontent.com/An1an1/wishlist/696c8c4e66ba14ca56c282ce46ac46e615a0fc54/images/10625749120071999.jpg",
        name: "Watch",
        desc: "Cartie",
        price: "$17,800.00",
        link: "#"
      },      
      // Добавляй сюда свои желания по примеру ниже ↓
    ];

    function renderItems(filteredItems) {
      const grid = document.getElementById('wishlist-grid');
      grid.innerHTML = '';
      
      filteredItems.forEach(item => {
        grid.innerHTML += `
          <div class="wish-card bg-white shadow-sm border border-gray-100" data-category="${item.category}">
            <img src="${item.img}" class="w-full h-80 object-cover" alt="${item.name}">
            <div class="p-6">
              <h3 class="font-medium text-xl mb-1">${item.name}</h3>
              <p class="text-gray-500 text-sm mb-4">${item.desc}</p>
              <div class="flex justify-between items-center">
                <span class="price">${item.price}</span>
                <a href="${item.link}" target="_blank" 
                   class="btn-gift text-white px-7 py-3 rounded-2xl text-sm font-medium flex items-center gap-2">
                  Подарить <i class="fa-solid fa-arrow-up-right-from-square"></i>
                </a>
              </div>
            </div>
          </div>
        `;
      });
    }

    function filterCategory(cat) {
      document.querySelectorAll('.category-tab').forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('onclick').includes(`'${cat}'`));
      });

      if (cat === 'all') {
        renderItems(items);
      } else {
        const filtered = items.filter(item => item.category === cat);
        renderItems(filtered);
      }
    }

    // Показываем все при загрузке
    renderItems(items);
  </script>

</body>
</html>
