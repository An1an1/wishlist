<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MY Wishlist</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }

    .wish-card {
      background: white;
      border-radius: 24px;
      overflow: hidden;
      position: relative;
      transition: all 0.4s cubic-bezier(0.4, 0.2, 0.2, 1);
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.05);
    }

    .wish-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1),
                  0 0 0 8px rgba(249, 168, 212, 0.25);
    }

    .price { font-size: 1.45rem; font-weight: 300; letter-spacing: -0.025em; color: #1f2937; }

    .btn-gift, .btn-cart {
      background: #f8c4d8;
      box-shadow: 0 4px 15px rgba(248, 196, 216, 0.4);
      transition: all 0.4s ease;
      font-weight: 500;
    }

    .btn-gift:hover, .btn-cart:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px -6px rgb(225 29 138 / 0.45);
    }

    .category-tab {
      background: white;
      color: #374151;
      border: 1px solid #f3e8f5;
      transition: all 0.4s;
      font-weight: 500;
    }

    .category-tab:hover {
      border-color: #f9a8d4;
      transform: translateY(-2px);
    }

    .category-tab.active {
      background: #f8c4d8;
      color: #333;
      border-color: #f8c4d8;
    }

    .cart-icon {
      position: relative;
      cursor: pointer;
    }
    .cart-count {
      position: absolute;
      top: -6px;
      right: -6px;
      background: #e11d8a;
      color: white;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }
  </style>
</head>
<body class="bg-zinc-50 min-h-screen">

  <header class="bg-black py-6 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 flex justify-between items-center">
      <div>
        <h1 class="text-4xl font-light tracking-tight text-white">MY Wishlist</h1>
        <p class="text-white/80">what I dream of ❤️</p>
      </div>
      <div onclick="showCart()" class="cart-icon text-3xl text-white">
        🛍️ <span id="cart-count" class="cart-count">0</span>
      </div>
    </div>
  </header>

  <div class="max-w-6xl mx-auto px-6 py-8">
    <!-- Категории -->
    <div class="flex flex-wrap gap-3 justify-center mb-10" id="categories">
      <button onclick="filterCategory('all')" class="category-tab active px-6 py-3 rounded-full border text-sm font-medium">All</button>
      <button onclick="filterCategory('flowers')" class="category-tab px-6 py-3 rounded-full border text-sm font-medium">🌸 Flowers</button>
      <button onclick="filterCategory('jewelry')" class="category-tab px-6 py-3 rounded-full border text-sm font-medium">💎 Jewelry</button>
      <button onclick="filterCategory('realestate')" class="category-tab px-6 py-3 rounded-full border text-sm font-medium">🏠 Realestate</button>
      <button onclick="filterCategory('cars')" class="category-tab px-6 py-3 rounded-full border text-sm font-medium">🚗 Cars</button>
      <button onclick="filterCategory('tech')" class="category-tab px-6 py-3 rounded-full border text-sm font-medium">📱 Tech & Gadgets</button>
      <button onclick="filterCategory('shoes')" class="category-tab px-6 py-3 rounded-full border text-sm font-medium">👠 Shoes</button>
      <button onclick="filterCategory('lingerie')" class="category-tab px-6 py-3 rounded-full border text-sm font-medium">🩷 Lingerie</button>
      <button onclick="filterCategory('travel')" class="category-tab px-6 py-3 rounded-full border text-sm font-medium">✈️ Travel</button>
      <button onclick="filterCategory('bags')" class="category-tab px-6 py-3 rounded-full border text-sm font-medium">👜 Bags</button>
      <button onclick="filterCategory('money')" class="category-tab px-6 py-3 rounded-full border text-sm font-medium">💰 Money & Crypto</button>
    </div>

    <!-- Сетка желаний -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="wishlist-grid"></div>
  </div>

  <!-- Модальное окно Корзины -->
  <div id="cart-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100]">
    <div class="bg-white rounded-3xl max-w-lg w-full mx-4 max-h-[90vh] overflow-hidden">
      <div class="p-6 border-b flex justify-between items-center">
        <h2 class="text-2xl font-medium">Корзина</h2>
        <button onclick="closeCart()" class="text-3xl leading-none">×</button>
      </div>
      
      <div id="cart-items" class="p-6 max-h-[60vh] overflow-auto"></div>
      
      <div class="p-6 border-t bg-gray-50">
        <div class="flex justify-between text-xl font-medium mb-6">
          <span>Итого:</span>
          <span id="total-price">0 ₽</span>
        </div>
        <button onclick="checkout()" class="w-full text-white py-4 rounded-2xl text-lg font-medium" style="background:#f8c4d8;">
          Перейти к оплате
        </button>
      </div>
    </div>
  </div>

  <script>
    let cart = [];

    const items = [
      {
        category: "flowers",
        img: "https://via.placeholder.com/600x600/eee/ddd?text=Букет_роз",
        name: "Большой букет пионов",
        desc: "Нежно-розовые",
        price: 150,
        priceText: "$150.00",
        link: "#"
      },
      {
        category: "jewelry",
        img: "https://raw.githubusercontent.com/An1an1/wishlist/696c8c4e66ba14ca56c282ce46ac46e615a0fc54/images/10625749120071999.jpg",
        name: "Watch",
        desc: "Cartie",
        price: 17800,
        priceText: "$17,800.00",
        link: "#"
      },
      {
        category: "jewelry",
        img: "https://raw.githubusercontent.com/An1an1/wishlist/696c8c4e66ba14ca56c282ce46ac46e615a0fc54/images/10907224092417006.jpg",
        name: "Watch",
        desc: "Rolex",
        price: 51900,
        priceText: "$51,900.00",
        link: "#"
      },
      {
        category: "jewelry",
        img: "https://raw.githubusercontent.com/An1an1/wishlist/696c8c4e66ba14ca56c282ce46ac46e615a0fc54/images/15551561209295402.jpg",
        name: "Watch",
        desc: "Rolex",
        price: 15400,
        priceText: "$15,400.00",
        link: "#"
      },
      {
        category: "jewelry",
        img: "https://raw.githubusercontent.com/An1an1/wishlist/696c8c4e66ba14ca56c282ce46ac46e615a0fc54/images/2533343538101877.jpg",
        name: "Watch",
        desc: "BvlgarI",
        price: 30000,
        priceText: "$30,000.00",
        link: "#"
      },
      {
        category: "jewelry",
        img: "https://raw.githubusercontent.com/An1an1/wishlist/696c8c4e66ba14ca56c282ce46ac46e615a0fc54/images/Без%20названия%20(4).jpg",
        name: "Watch",
        desc: "Rolex",
        price: 120000,
        priceText: "$120,000.00",
        link: "#"
      },
      {
        category: "jewelry",
        img: "https://raw.githubusercontent.com/An1an1/wishlist/696c8c4e66ba14ca56c282ce46ac46e615a0fc54/images/10625749120071999.jpg",
        name: "Watch",
        desc: "Cartie",
        price: 17800,
        priceText: "$17,800.00",
        link: "#"
      },
      {
        category: "jewelry",
        img: "https://raw.githubusercontent.com/An1an1/wishlist/696c8c4e66ba14ca56c282ce46ac46e615a0fc54/images/10625749120071999.jpg",
        name: "Watch",
        desc: "Cartie",
        price: 17800,
        priceText: "$17,800.00",
        link: "#"
      },
      {
        category: "jewelry",
        img: "https://raw.githubusercontent.com/An1an1/wishlist/696c8c4e66ba14ca56c282ce46ac46e615a0fc54/images/10625749120071999.jpg",
        name: "Watch",
        desc: "Cartie",
        price: 17800,
        priceText: "$17,800.00",
        link: "#"
      },
      {
        category: "jewelry",
        img: "https://raw.githubusercontent.com/An1an1/wishlist/696c8c4e66ba14ca56c282ce46ac46e615a0fc54/images/10625749120071999.jpg",
        name: "Watch",
        desc: "Cartie",
        price: 17800,
        priceText: "$17,800.00",
        link: "#"
      },      
      // Твои остальные товары остаются здесь — не удаляй их
    ];

    function renderItems(filteredItems) {
      const grid = document.getElementById('wishlist-grid');
      grid.innerHTML = '';
      
      filteredItems.forEach((item, index) => {
        grid.innerHTML += `
          <div class="wish-card" data-category="${item.category}">
            <img src="${item.img}" class="w-full h-80 object-cover" alt="${item.name}">
            <div class="p-6">
              <h3 class="font-medium text-xl mb-1">${item.name}</h3>
              <p class="text-gray-500 text-sm mb-4">${item.desc}</p>
              <div class="flex justify-between items-center">
                <span class="price">${item.priceText}</span>
                <button onclick="addToCart(${index})" 
                        class="btn-cart text-white px-6 py-3 rounded-2xl text-sm font-medium flex items-center gap-2">
                  В корзину
                </button>
              </div>
            </div>
          </div>
        `;
      });
    }

    function addToCart(index) {
      const item = {...items[index]};
      const existing = cart.find(i => i.name === item.name);
      
      if (existing) {
        existing.quantity = (existing.quantity || 1) + 1;
      } else {
        item.quantity = 1;
        cart.push(item);
      }
      
      updateCartCount();
    //  alert(`✅ ${item.name} добавлен в корзину`);
    }

    function removeFromCart(index) {
      cart.splice(index, 1);
      updateCartCount();
      showCart();
    }

    function changeQuantity(index, change) {
      cart[index].quantity += change;
      if (cart[index].quantity < 1) cart[index].quantity = 1;
      showCart();
    }

    function updateCartCount() {
      const count = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
      document.getElementById('cart-count').textContent = count;
    }

    function showCart() {
      const modal = document.getElementById('cart-modal');
      const container = document.getElementById('cart-items');
      container.innerHTML = '';
      let total = 0;

      if (cart.length === 0) {
        container.innerHTML = `<p class="text-center text-gray-400 py-12">Корзина пуста</p>`;
      } else {
        cart.forEach((item, index) => {
          const itemTotal = item.price * (item.quantity || 1);
          total += itemTotal;
          
          container.innerHTML += `
            <div class="flex gap-4 mb-6 last:mb-0">
              <img src="${item.img}" class="w-20 h-20 object-cover rounded-xl">
              <div class="flex-1">
                <h4 class="font-medium">${item.name}</h4>
                <p class="text-sm text-gray-500">${item.desc}</p>
                <div class="flex items-center gap-3 mt-2">
                  <button onclick="changeQuantity(${index}, -1)" class="w-6 h-6 border rounded">-</button>
                  <span class="font-medium">${item.quantity || 1}</span>
                  <button onclick="changeQuantity(${index}, 1)" class="w-6 h-6 border rounded">+</button>
                  <button onclick="removeFromCart(${index})" class="ml-auto text-red-500 text-sm">Удалить</button>
                </div>
              </div>
              <div class="text-right">
                <div class="font-medium">${item.priceText}</div>
                <div class="text-sm text-gray-500">x${item.quantity || 1}</div>
              </div>
            </div>
          `;
        });
      }

      document.getElementById('total-price').textContent = total.toLocaleString('ru-RU') + ' ₽';
      modal.classList.remove('hidden');
    }

    function closeCart() {
      document.getElementById('cart-modal').classList.add('hidden');
    }

    function checkout() {
      if (cart.length === 0) return;
      alert("🎉 Спасибо! Это демо-версия.\nВ будущем здесь можно подключить реальную оплату.");
      // cart = []; // можно раскомментировать, чтобы очищать корзину после "оплаты"
      closeCart();
      updateCartCount();
    }

    function filterCategory(cat) {
      document.querySelectorAll('.category-tab').forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('onclick').includes(`'${cat}'`));
      });

      if (cat === 'all') {
        renderItems(items);
      } else {
        const filtered = items.filter(item => item.category === cat);
        renderItems(filtered);
      }
    }

    // Инициализация
    renderItems(items);
  </script>
</body>
</html>
