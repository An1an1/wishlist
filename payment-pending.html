<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Processing — Wish Me ✨</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a84c; --gold-light: #e8d5a3; --gold-dark: #8a6a1f;
  --bg: #0a0a0f; --bg2: #11111a; --card-bg: #16161f;
  --text: #f0ead8; --text-muted: #7a7060; --rose: #c47a6a;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; font-weight: 300; min-height: 100vh; overflow-x: hidden; display: flex; flex-direction: column; }
body::before { content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0; background-image: radial-gradient(1px 1px at 10% 15%, rgba(201,168,76,.6) 0%, transparent 100%), radial-gradient(1px 1px at 30% 40%, rgba(255,255,255,.4) 0%, transparent 100%), radial-gradient(1.5px 1.5px at 50% 10%, rgba(201,168,76,.5) 0%, transparent 100%), radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,.3) 0%, transparent 100%), radial-gradient(1px 1px at 85% 25%, rgba(201,168,76,.4) 0%, transparent 100%), radial-gradient(1px 1px at 20% 75%, rgba(255,255,255,.3) 0%, transparent 100%); animation: twinkle 8s ease-in-out infinite alternate; }
@keyframes twinkle { 0%{opacity:.6} 100%{opacity:1} }
header { position: relative; z-index: 10; background: linear-gradient(180deg, rgba(10,10,15,.98) 0%, rgba(10,10,15,.88) 100%); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(201,168,76,.15); padding: 0 2.5rem; display: flex; align-items: center; height: 78px; }
.logo { font-family: 'Cormorant Garamond', serif; font-size: 1.9rem; font-weight: 300; font-style: italic; letter-spacing: .08em; background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-decoration: none; }
.logo b { font-style: normal; font-weight: 600; }
main { flex: 1; position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; padding: 4rem 1.5rem; }
.card { background: var(--card-bg); border: 1px solid rgba(201,168,76,.18); border-radius: 2px; max-width: 520px; width: 100%; padding: 3.5rem 3rem; text-align: center; box-shadow: 0 0 60px rgba(201,168,76,.04), 0 20px 60px rgba(0,0,0,.5); animation: fadeUp .7s ease-out forwards; }
@keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:none} }
.spinner-wrap { width: 80px; height: 80px; border-radius: 50%; background: rgba(201,168,76,.07); border: 1px solid rgba(201,168,76,.2); display: flex; align-items: center; justify-content: center; margin: 0 auto 2rem; position: relative; }
.spinner-wrap::before { content: ''; position: absolute; inset: -1px; border-radius: 50%; border: 2px solid transparent; border-top-color: var(--gold); animation: spin 1.4s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner-icon { font-size: 2rem; }
.eyebrow { font-size: .58rem; letter-spacing: .35em; text-transform: uppercase; color: var(--gold); margin-bottom: .8rem; }
h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.4rem; font-weight: 300; font-style: italic; color: var(--gold-light); line-height: 1.1; margin-bottom: 1rem; }
.divider { width: 50px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 1.4rem auto; }
.desc { font-size: .78rem; color: var(--text-muted); line-height: 1.85; margin-bottom: 1.8rem; }
.desc strong { color: var(--text); font-weight: 400; }
.refresh-note { display: inline-flex; align-items: center; gap: .5rem; background: rgba(201,168,76,.06); border: 1px solid rgba(201,168,76,.14); border-radius: 20px; padding: .5rem 1.2rem; font-size: .6rem; letter-spacing: .12em; color: var(--text-muted); margin-bottom: 1.8rem; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); animation: blink 1.2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
.contact-note { font-size: .62rem; letter-spacing: .06em; color: var(--text-muted); line-height: 1.7; }
.contact-note a { color: var(--gold-light); text-decoration: none; transition: color .2s; }
.contact-note a:hover { color: var(--gold); }
.refresh-btn { display: inline-block; margin-top: 2rem; background: none; border: 1px solid rgba(201,168,76,.3); color: var(--gold); font-family: 'Montserrat', sans-serif; font-size: .62rem; letter-spacing: .22em; text-transform: uppercase; padding: .85rem 2rem; border-radius: 1px; cursor: pointer; text-decoration: none; transition: all .3s; }
.refresh-btn:hover { background: rgba(201,168,76,.08); border-color: var(--gold); transform: translateY(-1px); }
footer { position: relative; z-index: 1; border-top: 1px solid rgba(201,168,76,.1); padding: 1.8rem 2.5rem; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 1rem; }
.footer-copy { font-size: .56rem; color: var(--text-muted); letter-spacing: .08em; }
.footer-links { display: flex; gap: 1.5rem; flex-wrap: wrap; }
.footer-links a { color: var(--text-muted); font-size: .56rem; letter-spacing: .08em; text-decoration: none; transition: color .2s; }
.footer-links a:hover { color: var(--gold); }
</style>
</head>
<body>
<header>
  <a href="index.html" class="logo"><b>Wish</b> Me</a>
</header>
<main>
  <div class="card">
    <div class="spinner-wrap">
      <span class="spinner-icon">⏳</span>
    </div>
    <div class="eyebrow" id="t-eyebrow"></div>
    <h1 id="t-title"></h1>
    <div class="divider"></div>
    <p class="desc" id="t-desc"></p>
    <div class="refresh-note">
      <span class="dot"></span>
      <span id="t-hint"></span>
    </div>
    <p class="contact-note">
      <span id="t-contact"></span><br>
      <a href="mailto:supp.wishme@gmail.com">supp.wishme@gmail.com</a>
    </p>
    <a href="javascript:location.reload()" class="refresh-btn" id="t-btn"></a>
  </div>
</main>
<footer>
  <div class="footer-copy">© 2025 Wish Me. All rights reserved.</div>
  <div class="footer-links">
    <a href="#" id="t-privacy"></a>
    <a href="#" id="t-terms"></a>
    <a href="#" id="t-refund"></a>
  </div>
</footer>
<script>
const T = {
  en: { eyebrow:"✦ Please wait ✦", title:"Processing…", desc:"Your payment is being processed.<br><strong>This may take a few minutes</strong> — please don't close this page.", hint:"Refresh in a moment to check your status", contact:"Need help? Contact us:", btn:"↻ Refresh Page", privacy:"Privacy Policy", terms:"Terms of Service", refund:"Refund Policy" },
  ru: { eyebrow:"✦ Пожалуйста, подождите ✦", title:"Обработка…", desc:"Ваш платёж обрабатывается.<br><strong>Это может занять несколько минут</strong> — не закрывайте страницу.", hint:"Обновите страницу через момент", contact:"Нужна помощь? Напишите нам:", btn:"↻ Обновить страницу", privacy:"Политика конфиденциальности", terms:"Условия использования", refund:"Политика возврата" },
  zh: { eyebrow:"✦ 请稍候 ✦", title:"处理中…", desc:"您的付款正在处理中。<br><strong>可能需要几分钟</strong> — 请不要关闭此页面。", hint:"稍后刷新页面以查看状态", contact:"需要帮助？联系我们：", btn:"↻ 刷新页面", privacy:"隐私政策", terms:"服务条款", refund:"退款政策" },
  ar: { eyebrow:"✦ يرجى الانتظار ✦", title:"جارٍ المعالجة…", desc:"يتم معالجة دفعتك حالياً.<br><strong>قد يستغرق ذلك بضع دقائق</strong> — يرجى عدم إغلاق هذه الصفحة.", hint:"قم بتحديث الصفحة بعد لحظة للتحقق", contact:"هل تحتاج مساعدة؟ تواصل معنا:", btn:"↻ تحديث الصفحة", privacy:"سياسة الخصوصية", terms:"شروط الخدمة", refund:"سياسة الاسترداد" },
  fr: { eyebrow:"✦ Veuillez patienter ✦", title:"Traitement en cours…", desc:"Votre paiement est en cours de traitement.<br><strong>Cela peut prendre quelques minutes</strong> — ne fermez pas cette page.", hint:"Actualisez dans un instant pour vérifier", contact:"Besoin d'aide ? Contactez-nous :", btn:"↻ Actualiser la page", privacy:"Politique de confidentialité", terms:"Conditions d'utilisation", refund:"Politique de remboursement" },
  es: { eyebrow:"✦ Por favor espera ✦", title:"Procesando…", desc:"Tu pago está siendo procesado.<br><strong>Esto puede tardar unos minutos</strong> — no cierres esta página.", hint:"Actualiza en un momento para verificar", contact:"¿Necesitas ayuda? Contáctanos:", btn:"↻ Actualizar página", privacy:"Política de privacidad", terms:"Términos de servicio", refund:"Política de reembolso" },
  de: { eyebrow:"✦ Bitte warten ✦", title:"Wird verarbeitet…", desc:"Deine Zahlung wird gerade bearbeitet.<br><strong>Dies kann einige Minuten dauern</strong> — bitte schließe diese Seite nicht.", hint:"Seite gleich aktualisieren und Status prüfen", contact:"Brauchst du Hilfe? Kontaktiere uns:", btn:"↻ Seite aktualisieren", privacy:"Datenschutzrichtlinie", terms:"Nutzungsbedingungen", refund:"Rückgaberecht" },
  ja: { eyebrow:"✦ しばらくお待ちください ✦", title:"処理中…", desc:"お支払いを処理しています。<br><strong>数分かかる場合があります</strong> — このページを閉じないでください。", hint:"しばらくしてページを更新してください", contact:"お困りですか？ご連絡ください：", btn:"↻ ページを更新", privacy:"プライバシーポリシー", terms:"利用規約", refund:"返金ポリシー" },
};

const lang = localStorage.getItem('wl_lang_v1') || 'en';
const t = T[lang] || T.en;
document.body.style.direction = lang === 'ar' ? 'rtl' : 'ltr';
document.getElementById('t-eyebrow').textContent = t.eyebrow;
document.getElementById('t-title').textContent = t.title;
document.getElementById('t-desc').innerHTML = t.desc;
document.getElementById('t-hint').textContent = t.hint;
document.getElementById('t-contact').textContent = t.contact;
document.getElementById('t-btn').textContent = t.btn;
document.getElementById('t-privacy').textContent = t.privacy;
document.getElementById('t-terms').textContent = t.terms;
document.getElementById('t-refund').textContent = t.refund;
</script>
</body>
</html>
