<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Successful — Wish Me ✨</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a84c; --gold-light: #e8d5a3; --gold-dark: #8a6a1f;
  --bg: #0a0a0f; --bg2: #11111a; --card-bg: #16161f;
  --text: #f0ead8; --text-muted: #7a7060; --rose: #c47a6a;
  --green: #7abf7a;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Montserrat', sans-serif; font-weight: 300;
  min-height: 100vh; overflow-x: hidden;
  display: flex; flex-direction: column;
}
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    radial-gradient(1px 1px at 10% 15%, rgba(201,168,76,.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 30% 40%, rgba(255,255,255,.4) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 50% 10%, rgba(201,168,76,.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 85% 25%, rgba(201,168,76,.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 20% 75%, rgba(255,255,255,.3) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 60% 80%, rgba(201,168,76,.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 90%, rgba(255,255,255,.2) 0%, transparent 100%);
  animation: twinkle 8s ease-in-out infinite alternate;
}
@keyframes twinkle { 0%{opacity:.6} 100%{opacity:1} }
header {
  position: relative; z-index: 10;
  background: linear-gradient(180deg, rgba(10,10,15,.98) 0%, rgba(10,10,15,.88) 100%);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(201,168,76,.15);
  padding: 0 2.5rem;
  display: flex; align-items: center; height: 78px;
}
.logo { font-family: 'Cormorant Garamond', serif; font-size: 1.9rem; font-weight: 300; font-style: italic; letter-spacing: .08em; background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-decoration: none; }
.logo b { font-style: normal; font-weight: 600; }
main {
  flex: 1; position: relative; z-index: 1;
  display: flex; align-items: center; justify-content: center;
  padding: 4rem 1.5rem;
}
.card {
  background: var(--card-bg);
  border: 1px solid rgba(122,191,122,.25);
  border-radius: 2px;
  max-width: 520px; width: 100%;
  padding: 3.5rem 3rem;
  text-align: center;
  box-shadow: 0 0 60px rgba(122,191,122,.05), 0 20px 60px rgba(0,0,0,.5);
  animation: fadeUp .7s ease-out forwards;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:none} }
.icon-wrap {
  width: 80px; height: 80px; border-radius: 50%;
  background: rgba(122,191,122,.1);
  border: 1px solid rgba(122,191,122,.3);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 2rem; font-size: 2.2rem;
  animation: pulse 3s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(122,191,122,.2)} 50%{transform:scale(1.04);box-shadow:0 0 0 12px rgba(122,191,122,0)} }
.eyebrow { font-size: .58rem; letter-spacing: .35em; text-transform: uppercase; color: var(--green); margin-bottom: .8rem; }
h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.4rem; font-weight: 300; font-style: italic; color: var(--gold-light); line-height: 1.1; margin-bottom: 1rem; }
.divider { width: 50px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 1.4rem auto; }
.desc { font-size: .78rem; color: var(--text-muted); line-height: 1.85; margin-bottom: 1.8rem; }
.desc strong { color: var(--text); font-weight: 400; }
.contact-note { font-size: .62rem; letter-spacing: .06em; color: var(--text-muted); line-height: 1.7; }
.contact-note a { color: var(--gold-light); text-decoration: none; transition: color .2s; }
.contact-note a:hover { color: var(--gold); }
.back-btn {
  display: inline-block; margin-top: 2rem;
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  border: none; color: #0a0a0f;
  font-family: 'Montserrat', sans-serif; font-size: .62rem;
  font-weight: 500; letter-spacing: .22em; text-transform: uppercase;
  padding: .9rem 2.2rem; border-radius: 1px; cursor: pointer;
  text-decoration: none; transition: all .3s;
}
.back-btn:hover { box-shadow: 0 6px 25px rgba(201,168,76,.4); transform: translateY(-1px); }
.sparkle { position: fixed; pointer-events: none; z-index: 9999; font-size: 1.2rem; animation: floatUp 1.4s ease-out forwards; }
@keyframes floatUp { 0%{opacity:1;transform:translateY(0) scale(1) rotate(0)} 100%{opacity:0;transform:translateY(-90px) scale(.2) rotate(200deg)} }
footer {
  position: relative; z-index: 1;
  border-top: 1px solid rgba(201,168,76,.1);
  padding: 1.8rem 2.5rem;
  display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 1rem;
}
.footer-copy { font-size: .56rem; color: var(--text-muted); letter-spacing: .08em; }
.footer-links { display: flex; gap: 1.5rem; flex-wrap: wrap; }
.footer-links a { color: var(--text-muted); font-size: .56rem; letter-spacing: .08em; text-decoration: none; transition: color .2s; }
.footer-links a:hover { color: var(--gold); }
</style>
</head>
<body>
<header>
  <a href="index.html" class="logo"><b>Wish</b> Me</a>
</header>
<main>
  <div class="card">
    <div class="icon-wrap">✨</div>
    <div class="eyebrow" id="t-eyebrow"></div>
    <h1 id="t-title"></h1>
    <div class="divider"></div>
    <a href="index.html" class="back-btn" id="t-btn"></a>
  </div>
</main>
<footer>
  <div class="footer-copy">© 2025 Wish Me. All rights reserved.</div>
  <div class="footer-links">
    <a href="#" id="t-privacy"></a>
    <a href="#" id="t-terms"></a>
    <a href="#" id="t-refund"></a>
  </div>
</footer>
<script>
const T = {
  en: { eyebrow:"✦ Payment confirmed ✦", title:"Gift Sent!", btn:"← Back to Wishes", privacy:"Privacy Policy", terms:"Terms of Service", refund:"Refund Policy" },
  ru: { eyebrow:"✦ Оплата подтверждена ✦", title:"Подарок отправлен!", btn:"← Назад к желаниям", privacy:"Политика конфиденциальности", terms:"Условия использования", refund:"Политика возврата" },
  zh: { eyebrow:"✦ 付款已确认 ✦", title:"礼物已发送！", btn:"← 返回心愿", privacy:"隐私政策", terms:"服务条款", refund:"退款政策" },
  ar: { eyebrow:"✦ تم تأكيد الدفع ✦", title:"تم إرسال الهدية!", btn:"← العودة إلى الأمنيات", privacy:"سياسة الخصوصية", terms:"شروط الخدمة", refund:"سياسة الاسترداد" },
  fr: { eyebrow:"✦ Paiement confirmé ✦", title:"Cadeau envoyé !", btn:"← Retour aux désirs", privacy:"Politique de confidentialité", terms:"Conditions d'utilisation", refund:"Politique de remboursement" },
  es: { eyebrow:"✦ Pago confirmado ✦", title:"¡Regalo enviado!", btn:"← Volver a los deseos", privacy:"Política de privacidad", terms:"Términos de servicio", refund:"Política de reembolso" },
  de: { eyebrow:"✦ Zahlung bestätigt ✦", title:"Geschenk gesendet!", btn:"← Zurück zu den Wünschen", privacy:"Datenschutzrichtlinie", terms:"Nutzungsbedingungen", refund:"Rückgaberecht" },
  ja: { eyebrow:"✦ お支払い確認済み ✦", title:"ギフトが送られました！", btn:"← ウィッシュに戻る", privacy:"プライバシーポリシー", terms:"利用規約", refund:"返金ポリシー" },
};

const lang = localStorage.getItem('wl_lang_v1') || 'en';
const t = T[lang] || T.en;
document.body.style.direction = lang === 'ar' ? 'rtl' : 'ltr';
document.getElementById('t-eyebrow').textContent = t.eyebrow;
document.getElementById('t-title').textContent = t.title;
document.getElementById('t-btn').textContent = t.btn;
document.getElementById('t-privacy').textContent = t.privacy;
document.getElementById('t-terms').textContent = t.terms;
document.getElementById('t-refund').textContent = t.refund;

function sparkles(x, y) {
  ['✨','⭐','💫','🌟','✦'].forEach((e,i) => {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'sparkle'; el.textContent = e;
      el.style.left = (x + (Math.random()-.5)*80) + 'px';
      el.style.top  = (y + (Math.random()-.5)*50) + 'px';
      el.style.animationDuration = (.9 + Math.random()*.7) + 's';
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }, i * 80);
  });
}
window.addEventListener('load', () => {
  for (let i = 0; i < 20; i++)
    setTimeout(() => sparkles(Math.random()*window.innerWidth, Math.random()*window.innerHeight*.7), i * 100);
});
</script>
</body>
</html>
